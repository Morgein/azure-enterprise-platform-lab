name: Continuous Integration

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  python-quality:
    name: Python Quality and Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    defaults:
      run:
        working-directory: application

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"
          cache: pip
          cache-dependency-path: application/pyproject.toml

      - name: Install application and development dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --editable ".[dev]"

      - name: Check code formatting
        run: ruff format --check .

      - name: Run static analysis
        run: ruff check .

      - name: Run tests with coverage
        run: |
          python -m pytest \
            --cov=azure_platform_api \
            --cov-report=term-missing \
            --cov-report=xml

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage-report
          path: application/coverage.xml
          if-no-files-found: error
          retention-days: 14

  container-quality:
    name: Container Build and Smoke Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - python-quality

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Build container image
        run: |
          docker build \
            --tag azure-platform-api:${{ github.sha }} \
            application

      - name: Verify non-root image configuration
        run: |
          configured_user="$(
            docker image inspect \
              azure-platform-api:${{ github.sha }} \
              --format '{{.Config.User}}'
          )"

          echo "Configured runtime user: ${configured_user}"

          test "${configured_user}" = "10001:10001"

          docker run \
            --rm \
            --entrypoint id \
            azure-platform-api:${{ github.sha }} \
            | grep "uid=10001(appuser)"

      - name: Start hardened container
        run: |
          docker run \
            --detach \
            --rm \
            --name azure-platform-api-ci \
            --publish 8000:8000 \
            --env APP_ENV=ci \
            --read-only \
            --tmpfs /tmp:rw,noexec,nosuid,size=64m \
            --cap-drop=ALL \
            --security-opt=no-new-privileges:true \
            --health-interval=2s \
            --health-timeout=2s \
            --health-start-period=2s \
            --health-retries=5 \
            azure-platform-api:${{ github.sha }}

      - name: Wait for healthy container
        run: |
          for attempt in {1..20}; do
            health_status="$(
              docker inspect \
                azure-platform-api-ci \
                --format '{{.State.Health.Status}}'
            )"

            echo "Attempt ${attempt}: ${health_status}"

            if [[ "${health_status}" == "healthy" ]]; then
              exit 0
            fi

            if [[ "${health_status}" == "unhealthy" ]]; then
              docker logs azure-platform-api-ci
              exit 1
            fi

            sleep 1
          done

          echo "Container did not become healthy in time."
          docker logs azure-platform-api-ci
          exit 1

      - name: Run API smoke tests
        run: |
          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8000/health/live

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8000/health/ready

          curl \
            --fail \
            --silent \
            --show-error \
            http://127.0.0.1:8000/api/v1/info \
            | grep '"environment":"ci"'

          curl \
            --fail \
            --silent \
            --show-error \
            --dump-header - \
            --output /dev/null \
            --header "X-Correlation-ID: ci-smoke-test" \
            http://127.0.0.1:8000/api/v1/info \
            | grep --ignore-case "x-correlation-id: ci-smoke-test"

      - name: Collect logs and stop container
        if: always()
        run: |
          docker logs azure-platform-api-ci || true
          docker stop azure-platform-api-ci || true
