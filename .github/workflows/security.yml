name: Security Scanning

on:
  push:
    branches:
      - main
    paths:
      - "application/**"
      - "infrastructure/**"
      - ".github/workflows/**"

  pull_request:
    branches:
      - main
    paths:
      - "application/**"
      - "infrastructure/**"
      - ".github/workflows/**"

  schedule:
    - cron: "23 3 * * 1"

  workflow_dispatch:

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  container-image-scan:
    name: Trivy Container Image Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Build container image for security scanning
        run: |
          docker build \
            --pull \
            --tag azure-platform-api:security-scan \
            application

      - name: Scan container image with Trivy
        uses: aquasecurity/trivy-action@a9c7b0f06e461e9d4b4d1711f154ee024b8d7ab8 # v0.36.0
        with:
          scan-type: image
          image-ref: azure-platform-api:security-scan
          scanners: vuln,secret
          vuln-type: os,library
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          limit-severities-for-sarif: true
          format: sarif
          output: trivy-results.sarif
          exit-code: "1"

      - name: Upload Trivy results to GitHub Code Scanning
        if: >-
          always() &&
          hashFiles('trivy-results.sarif') != '' &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: github/codeql-action/upload-sarif@d03f4cc0498d5a63039d157eb274d9c2fc50f17a # v3.37.1
        with:
          sarif_file: trivy-results.sarif
          category: trivy-container-image

  terraform-security-scan:
    name: Checkov Terraform Security Scan
    runs-on: ubuntu-24.04
    timeout-minutes: 20

    permissions:
      contents: read
      security-events: write

    env:
      CHECKOV_VERSION: "3.3.8"
      PIP_DISABLE_PIP_VERSION_CHECK: "1"
      PIP_NO_INPUT: "1"

    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.12"

      - name: Install pinned Checkov version
        run: |
          python -m pip install "checkov==${CHECKOV_VERSION}"

          installed_version="$(checkov --version)"
          echo "Installed Checkov version: ${installed_version}"

          test "${installed_version}" = "${CHECKOV_VERSION}"

      - name: Scan Terraform configuration with Checkov
        id: checkov
        continue-on-error: true
        run: |
          checkov \
            --directory infrastructure \
            --framework terraform \
            --output cli \
            --output sarif \
            --output-file-path console,checkov-results.sarif \
            --compact

      - name: Upload Checkov results to GitHub Code Scanning
        if: >-
          always() &&
          hashFiles('checkov-results.sarif') != '' &&
          (
            github.event_name != 'pull_request' ||
            github.event.pull_request.head.repo.full_name == github.repository
          )
        uses: github/codeql-action/upload-sarif@d03f4cc0498d5a63039d157eb274d9c2fc50f17a # v3.37.1
        with:
          sarif_file: checkov-results.sarif
          category: checkov-terraform

      - name: Enforce Checkov policy gate
        if: always() && steps.checkov.outcome == 'failure'
        run: |
          echo "::error::Checkov detected Terraform policy violations."
          exit 1

  dependency-review:
    name: Dependency Review
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          fail-on-severity: high