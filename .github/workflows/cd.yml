name: Continuous Deployment

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - Continuous Integration
    branches:
      - main
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: cd-development
  cancel-in-progress: false

jobs:
  detect-changes:
    name: Detect deployable changes
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.workflow_run.conclusion == 'success' &&
        github.event.workflow_run.event == 'push'
      )
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      deploy: ${{ steps.changes.outputs.deploy }}
      deploy_sha: ${{ steps.target.outputs.sha }}

    steps:
      - name: Determine deployment commit
        id: target
        shell: bash
        env:
          WORKFLOW_RUN_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail

          if [[ -n "${WORKFLOW_RUN_SHA}" ]]; then
            deploy_sha="${WORKFLOW_RUN_SHA}"
          else
            deploy_sha="${GITHUB_SHA}"
          fi

          echo "Deployment commit: ${deploy_sha}"
          echo "sha=${deploy_sha}" >> "${GITHUB_OUTPUT}"

      - name: Checkout deployment commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ steps.target.outputs.sha }}
          fetch-depth: 2

      - name: Detect application changes
        id: changes
        shell: bash
        env:
          DEPLOY_SHA: ${{ steps.target.outputs.sha }}
        run: |
          set -euo pipefail

          if [[ "${GITHUB_EVENT_NAME}" == "workflow_dispatch" ]]; then
            echo "Manual deployment requested."
            echo "deploy=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          changed_files="$(
            git diff-tree \
              --no-commit-id \
              --name-only \
              --recursive \
              -m \
              "${DEPLOY_SHA}" \
              | sort --unique
          )"

          echo "Changed files:"
          printf '%s\n' "${changed_files}"

          if grep \
            --extended-regexp \
            --quiet \
            '^(application/|\.github/workflows/cd\.yml$)' \
            <<< "${changed_files}"; then
            echo "Deployable changes detected."
            echo "deploy=true" >> "${GITHUB_OUTPUT}"
          else
            echo "No deployable changes detected."
            echo "deploy=false" >> "${GITHUB_OUTPUT}"
          fi

  build-and-deploy:
    name: Build and deploy to Development
    needs:
      - detect-changes
    if: needs.detect-changes.outputs.deploy == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30

    environment:
      name: development

    permissions:
      contents: read
      id-token: write

    env:
      DEPLOY_SHA: ${{ needs.detect-changes.outputs.deploy_sha }}
      AZURE_CONTAINER_APP: ${{ vars.AZURE_CONTAINER_APP }}
      AZURE_CONTAINER_REGISTRY: ${{ vars.AZURE_CONTAINER_REGISTRY }}
      AZURE_RESOURCE_GROUP: ${{ vars.AZURE_RESOURCE_GROUP }}
      CONTAINER_REPOSITORY: ${{ vars.CONTAINER_REPOSITORY }}
      REGISTRY_LOGIN_SERVER: ${{ vars.AZURE_CONTAINER_REGISTRY }}.azurecr.io

    steps:
      - name: Checkout verified deployment commit
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.detect-changes.outputs.deploy_sha }}

      - name: Authenticate to Azure with OIDC
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Verify Azure context
        shell: bash
        run: |
          set -euo pipefail

          az account show \
            --query "{subscription:name,state:state}" \
            --output table

      - name: Install Azure Container Apps extension
        shell: bash
        run: |
          set -euo pipefail

          az extension add \
            --name containerapp \
            --upgrade \
            --only-show-errors

      - name: Authenticate Docker to Azure Container Registry
        shell: bash
        run: |
          set -euo pipefail

          az acr login \
            --name "${AZURE_CONTAINER_REGISTRY}" \
            --only-show-errors

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Define immutable image metadata
        id: image
        shell: bash
        run: |
          set -euo pipefail

          short_sha="$(printf '%s' "${DEPLOY_SHA}" | cut -c1-12)"
          image_tag="sha-${short_sha}"
          image_reference="${REGISTRY_LOGIN_SERVER}/${CONTAINER_REPOSITORY}:${image_tag}"

          echo "tag=${image_tag}" >> "${GITHUB_OUTPUT}"
          echo "reference=${image_reference}" >> "${GITHUB_OUTPUT}"

          echo "Image tag: ${image_tag}"
          echo "Image reference: ${image_reference}"

      - name: Build and push container image
        id: build
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: ./application
          file: ./application/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.image.outputs.reference }}
          cache-from: type=gha,scope=azure-platform-api-development
          cache-to: type=gha,mode=max,scope=azure-platform-api-development
          provenance: mode=max
          sbom: true

      - name: Deploy immutable image digest
        id: deploy
        shell: bash
        env:
          IMAGE_DIGEST: ${{ steps.build.outputs.digest }}
        run: |
          set -euo pipefail

          image_by_digest="${REGISTRY_LOGIN_SERVER}/${CONTAINER_REPOSITORY}@${IMAGE_DIGEST}"

          az containerapp update \
            --name "${AZURE_CONTAINER_APP}" \
            --resource-group "${AZURE_RESOURCE_GROUP}" \
            --image "${image_by_digest}" \
            --only-show-errors \
            --output none

          echo "image=${image_by_digest}" >> "${GITHUB_OUTPUT}"

      - name: Run deployment smoke tests
        id: smoke
        shell: bash
        run: |
          set -euo pipefail

          fqdn="$(
            az containerapp show \
              --name "${AZURE_CONTAINER_APP}" \
              --resource-group "${AZURE_RESOURCE_GROUP}" \
              --query "properties.configuration.ingress.fqdn" \
              --output tsv
          )"

          if [[ -z "${fqdn}" ]]; then
            echo "Container App FQDN was not returned."
            exit 1
          fi

          http_get() {
            local path="$1"
            local attempt

            for attempt in $(seq 1 30); do
              if curl \
                --fail \
                --silent \
                --show-error \
                --connect-timeout 5 \
                --max-time 20 \
                "https://${fqdn}${path}"; then
                return 0
              fi

              echo "Waiting for ${path}; attempt ${attempt}/30..." >&2
              sleep 10
            done

            echo "Smoke test failed for ${path}." >&2
            return 1
          }

          live_response="$(http_get "/health/live")"
          ready_response="$(http_get "/health/ready")"
          info_response="$(http_get "/api/v1/info")"

          jq -e \
            '.status == "healthy" and .service == "Azure Enterprise Platform API"' \
            <<< "${live_response}" \
            > /dev/null

          jq -e \
            '.status == "ready" and .service == "Azure Enterprise Platform API"' \
            <<< "${ready_response}" \
            > /dev/null

          jq -e \
            '.service == "Azure Enterprise Platform API" and .environment == "dev"' \
            <<< "${info_response}" \
            > /dev/null

          echo "FQDN: ${fqdn}"
          echo "Liveness response: ${live_response}"
          echo "Readiness response: ${ready_response}"
          echo "Service info response: ${info_response}"

          echo "fqdn=${fqdn}" >> "${GITHUB_OUTPUT}"

      - name: Write deployment summary
        shell: bash
        run: |
          {
            echo "### Development deployment"
            echo ""
            echo "- Environment: development"
            echo "- Commit: ${DEPLOY_SHA}"
            echo "- Container App: ${AZURE_CONTAINER_APP}"
            echo "- Image tag: ${{ steps.image.outputs.tag }}"
            echo "- Image digest: ${{ steps.build.outputs.digest }}"
            echo "- FQDN: ${{ steps.smoke.outputs.fqdn }}"
            echo "- Smoke tests: passed"
          } >> "${GITHUB_STEP_SUMMARY}"